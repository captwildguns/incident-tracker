name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Figma files/package-lock.json
      - name: Install dependencies
        working-directory: Figma files
        run: npm ci
      - name: Patch reactify-wc for React 18
        working-directory: Figma files
        run: |
          FILE="node_modules/@tylertech/forge-react/node_modules/reactify-wc/dist/index.js"
          if [ -f "$FILE" ]; then
            node -e "
              const fs = require('fs');
              let code = fs.readFileSync('$FILE', 'utf8');
              // Add null guard to setProperty
              code = code.replace(
                'setProperty(e,t){this.ref.current[e]=t}',
                'setProperty(e,t){if(this.ref.current)this.ref.current[e]=t}'
              );
              // Add null guard to setAttribute
              code = code.replace(
                'setAttribute(e,t){this.ref.current.removeAttribute',
                'setAttribute(e,t){if(!this.ref.current)return;if'
              ).replace(
                'setAttribute(e,t){if(!1===t)return this.ref.current.removeAttribute(e);this.ref.current.setAttribute',
                'setAttribute(e,t){if(!this.ref.current)return;if(!1===t)return this.ref.current.removeAttribute(e);this.ref.current.setAttribute'
              );
              // Add null guard to setEvent
              code = code.replace(
                'setEvent(e,t){this.eventHandlers',
                'setEvent(e,t){if(!this.ref.current)return;this.eventHandlers'
              );
              // Add null guard to clearEventHandlers
              code = code.replace(
                'this.eventHandlers.forEach(([e,t])=>{this.ref.current.removeEventListener',
                'this.eventHandlers.forEach(([e,t])=>{if(this.ref.current)this.ref.current.removeEventListener'
              );
              // Add null guard to className setter
              code = code.replace(
                'return this.ref.current.className=t',
                'return this.ref.current&&(this.ref.current.className=t)'
              );
              fs.writeFileSync('$FILE', code);
              console.log('reactify-wc patched successfully');
            "
          fi
      - name: Build
        working-directory: Figma files
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: Figma files/build
      - id: deployment
        uses: actions/deploy-pages@v4
